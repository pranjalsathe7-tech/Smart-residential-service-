<!DOCTYPE html>

<html> <head>

<title>Profile</title>

<style> body{ margin:0; display:flex; font-family:Arial; background:#f5f5f5; } .sidebar{ width:220px; height:100vh; background:#232938; color:white; padding:20px; } .sidebar ul{ list-style:none; padding:0; } .sidebar li{ padding:15px; cursor:pointer; } .sidebar li:hover{ background:#394057; } .main{ flex:1; padding:20px; } .profile{ display:flex; gap:20px; } .left,.right{ background:white; padding:20px; border-radius:10px; } .left{ width:50%; } .right{ width:40%; } .avatar{ text-align:center; font-size:80px; } table{ width:100%; } td{ padding:15px; } .btn{ background:#007bff; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; margin-right:10px; } .form-box{ display:none; background:white; padding:20px; border-radius:10px; margin-top:20px; width:50%; } input{ width:100%; padding:8px; margin:10px 0; } .message{ margin-top:10px; color:green; font-weight:bold; } </style>

</head>

<body>

<div class="sidebar">

<h2>Smart Residential</h2>

<ul> <li onclick="menuClick('Dashboard')">Dashboard</li> <li onclick="menuClick('Services')">Services</li> <li onclick="menuClick('My Requests')">My Requests</li> <li onclick="menuClick('Profile')">Profile</li> <li onclick="menuClick('Main Site')">Main Site</li> <li onclick="menuClick('Logout')">Logout</li> </ul>

</div>

<div class="main">

<h1>My Profile</h1>

<button class="btn" onclick="showForm()">Edit Profile</button>

<div class="message" id="msg"></div>

<br><br>

<div class="profile">

<div class="left">

<div class="avatar">👤</div>

<center> <h2 id="name">kk</h2> <p>User</p> </center>

<hr>

<p><b>Email:</b> <span id="email">asdf@gmail.com</span></p> <p><b>Phone:</b> <span id="phone">1234567890</span></p> <p><b>Address:</b> <span id="address">Solapur</span></p>

</div>

<div class="right">

<h2>Account Summary</h2>

<table> <tr><td>Total Requests</td><td>0</td></tr> <tr><td>Completed</td><td>0</td></tr> <tr><td>Pending</td><td>0</td></tr> <tr><td>Cancelled</td><td>0</td></tr> </table>

</div>

</div>

<!-- EDIT FORM -->

<div class="form-box" id="formBox">

<h3>Edit Profile</h3>

<input type="text" id="newName" placeholder="Enter Name"> <input type="email" id="newEmail" placeholder="Enter Email"> <input type="text" id="newPhone" placeholder="Enter Phone"> <input type="text" id="newAddress" placeholder="Enter Address">

<button class="btn" onclick="saveProfile()">Save</button>
<button class="btn" onclick="cancelEdit()">Cancel</button>

</div>

</div>

<script> // Sidebar click function menuClick(menu){ alert(menu + " clicked"); } // Show form function showForm(){ document.getElementById("formBox").style.display = "block"; } // Cancel edit function cancelEdit(){ document.getElementById("formBox").style.display = "none"; document.getElementById("msg").innerHTML = "Edit cancelled!"; } // Save profile function saveProfile(){ let name = document.getElementById("newName").value; let email = document.getElementById("newEmail").value; let phone = document.getElementById("newPhone").value; let address = document.getElementById("newAddress").value; if(name === "" || email === "" || phone === "" || address === ""){ document.getElementById("msg").innerHTML = "Please fill all fields!"; } else{ document.getElementById("name").innerText = name; document.getElementById("email").innerText = email; document.getElementById("phone").innerText = phone; document.getElementById("address").innerText = address; document.getElementById("formBox").style.display = "none"; document.getElementById("msg").innerHTML = "Profile Updated Successfully!"; } } </script>

</body> </html>
