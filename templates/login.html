<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #00c6ff, #7fff00);
        }

        .container {
            width: 800px;
            height: 450px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* LEFT SIDE */
        .left {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .left h2 {
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        .radio-group {
            margin: 10px 0;
        }

        .radio-group label {
            margin: 0 5px;
            font-size: 14px;
        }

        .btn {
            margin-top: 15px;
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
        }

        /* RIGHT SIDE */
        .right {
            flex: 1;
            background: linear-gradient(to bottom, #1fa463, #0c8b4d);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .right h2 {
            margin-bottom: 15px;
        }

        .signup-btn {
            margin-top: 20px;
            padding: 10px 25px;
            border: 1px solid white;
            border-radius: 20px;
            background: transparent;
            color: white;
            cursor: pointer;
        }

        .message {
            margin-top: 10px;
            font-size: 14px;
            color: yellow;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- LEFT SIDE (LOGIN) -->
        <div class="left">
            <h2>Sign In</h2>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="message">
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>

                <div class="radio-group">
                    <label><input type="radio" name="role" value="user" style="width:auto" checked> User</label>
                    <label><input type="radio" name="role" value="worker" style="width:auto"> Worker</label>
                    <label><input type="radio" name="role" value="admin" style="width:auto"> Admin</label>
                </div>

                <small>Forgot your password?</small>

                <button class="btn" type="submit">SIGN IN</button>
            </form>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
            <h2>Hello, Friend!</h2>
            <p>Register with your personal details to use all of site features</p>
            <a href="{{ url_for('register') }}"><button class="signup-btn" type="button">SIGN UP</button></a>
        </div>

    </div>

</body>

</html>
