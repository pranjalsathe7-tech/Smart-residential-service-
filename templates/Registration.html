<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        .container {
            width: 900px;
            height: 500px;
            display: flex;
            border-radius: 15px;
            overflow: hidden;
            background: #2c2638;
        }

        /* LEFT SIDE */
        .left {
            width: 50%;
            background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") no-repeat center/cover;
            position: relative;
            color: white;
            padding: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ffffff33;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .left-text {
            position: absolute;
            bottom: 40px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        /* RIGHT SIDE */
        .right {
            width: 50%;
            padding: 40px;
            color: white;
        }

        .right h1 {
            margin-bottom: 10px;
        }

        .right p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        .right a {
            color: #9b7bff;
            text-decoration: none;
        }

        .form-group {
            display: flex;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            background: #3a344a;
            color: white;
        }

        .checkbox {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }

        .checkbox input {
            width: auto;
            margin-right: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #7c5cff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            font-size: 14px;
        }

        .social {
            display: flex;
            gap: 10px;
        }

        .social button {
            background: transparent;
            border: 1px solid #555;
        }

        .message {
            margin-top: 10px;
            font-size: 14px;
            color: yellow;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- LEFT -->
        <div class="left">
            <div class="logo">ARU</div>
            <a href="{{ url_for('home') }}" class="back-btn">Back to Website →</a>

            <div class="left-text">
                Framing Feelings,<br>
                Not Just Faces
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <h1>Create an account</h1>
            <p>Already have Account? <a href="{{ url_for('login') }}">Log in</a></p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="message">
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <input type="text" name="first_name" placeholder="First Name" required>
                    <input type="text" name="last_name" placeholder="Last Name" required>
                </div>

                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Enter Your Password" minlength="6" required>

                <div class="form-group">
                    <label><input type="radio" name="role" value="user" style="width:auto" checked> Resident</label>
                    <label><input type="radio" name="role" value="worker" style="width:auto"> Worker</label>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="terms" style="width:auto" required>
                    <span>I agree to Terms &amp; Conditions</span>
                </div>

                <button type="submit">Create account</button>
            </form>

            <div class="divider">Or register with</div>

            <div class="social">
                <button type="button">Google</button>
                <button type="button">Apple</button>
            </div>
        </div>

    </div>

</body>

</html>
