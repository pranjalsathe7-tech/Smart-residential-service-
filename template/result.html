<!DOCTYPE html>
<html>

<head>

    <title>Result Page</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        .container {
            padding: 60px;
        }

        .steps {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .box {
            background: white;
            width: 300px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
        }

        .icon {
            font-size: 50px;
            color: blue;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>How It Works</h1>

        <div class="steps">

            <div class="box">
                <div class="icon">🔍</div>
                <h2>Choose a Service</h2>
                <p>Select required service.</p>
            </div>

            <div class="box">
                <div class="icon">📅</div>
                <h2>Schedule Appointment</h2>
                <p>Select date and time.</p>
            </div>

            <div class="box">
                <div class="icon">🏠</div>
                <h2>Get Service Done</h2>
                <p>Worker completes the service.</p>
            </div>

        </div>

        <br><br>

        <h1>Contact Us</h1>

    </div>

</body>

</html>
