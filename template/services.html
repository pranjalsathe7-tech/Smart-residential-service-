<!DOCTYPE html>
<html>

<head>
    <title>Services Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        .header {
            background: gray;
            height: 50px;
        }

        .title {
            text-align: center;
            font-size: 45px;
            padding: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            width: 320px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 10px lightgray;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .content {
            padding: 20px;
        }

        h2 {
            margin: 0;
        }

        p {
            color: #444;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>

</head>

<body>

    <div class="header"></div>

    <div class="title">
        Our Services
    </div>

    <div class="container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1585704032915-c3400ca199e7">

            <div class="content">
                <h2>Plumbing</h2>
                <p>Plumbing services including repairs and installations</p>
                <button>Book Now</button>
            </div>
        </div>


        <div class="card">
            <img src="istockphoto-1469656864-612x612.jpg">
            <div class="content">
                <h2>Electrical</h2>
                <p>Electrical services including repairs and installations</p>
                <button>Book Now</button>
            </div>
        </div>


        <div class="card">
            <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">

            <div class="content">
                <h2>Cleaning</h2>
                <p>Home cleaning services</p>
                <button>Book Now</button>
            </div>
        </div>

    </div>

</body>

</html>
